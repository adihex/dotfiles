; Gammastep config — Wayland-native redshift
; Uses wlr-gamma-control protocol (supported by Niri)
;
; GeoClue2 can auto-detect location if you prefer:
;   location-provider=geoclue2
;   (then delete the [manual] section below)

[redshift]
temp-day=5700
temp-night=3500
transition=1
gamma=0.850
location-provider=manual

[manual]
; Replace with your coordinates: https://www.latlong.net/
lat=40.7
lon=-74.0
